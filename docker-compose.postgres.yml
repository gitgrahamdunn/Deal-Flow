services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dealflow-postgres
    environment:
      POSTGRES_DB: dealflow
      POSTGRES_USER: dealflow
      POSTGRES_PASSWORD: dealflow
    ports:
      - "5432:5432"
    volumes:
      - dealflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  dealflow_postgres_data:
